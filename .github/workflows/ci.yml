name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install system deps (ffmpeg)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Install Python deps
        # openai-whisper pulls torch (huge); skip it in CI since tests mock it out.
        run: |
          python -m pip install --upgrade pip
          grep -v '^openai-whisper' requirements.txt > requirements.ci.txt
          pip install -r requirements.ci.txt
          pip install -r requirements-dev.txt

      - name: Run pytest
        env:
          DATABASE_URL: sqlite+aiosqlite:///:memory:
          JWT_SECRET_KEY: ci-test-secret-hex-32-chars-1234567890abcdef
          GROQ_API_KEY: ""
          ARQ_REDIS_URL: ""
          SMTP_HOST: ""
          PERSIST_AUDIO: "false"
          EMBEDDING_BACKEND: "hash"
        run: pytest

  frontend-typecheck:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: Lint
        run: npm run lint --if-present

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: npm run build --if-present
