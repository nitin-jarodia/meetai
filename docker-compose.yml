services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: meetai
    ports:
      - "5432:5432"
    volumes:
      - meetai_pgdata:/var/lib/postgresql/data

volumes:
  meetai_pgdata:
